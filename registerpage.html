<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B' Helpful - Create Account</title>
    <link rel="stylesheet" href="style_register.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="register-body">
    <nav class="auth-navbar">
        <img src="assets/b-helpful logo.jpeg" alt="B-Helpful Logo" class="logo">
        <a href="loginpage.html" class="nav-link-auth">Log in &rarr;</a>
    </nav>

    <div class="auth-container">
        <section class="auth-desc">
            <h1>Berdampak bagi Sesama,<br>Bangun Masa Depanmu.</h1>
            <p>Platform pengumpulan jam Community Service bagi mahasiswa Bina Nusantara University.</p>
            <img src="assets/logobinus.png" alt="Binus Logo" class="binus-logo-auth">
        </section>

        <section class="auth-form-section">
            <form id="registerForm" class="auth-form">
                <h2 class="form-title">Create Account</h2>
                
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="input-group">
                        <label for="conPassword">Confirm Password</label>
                        <input type="password" id="conPassword" name="conPassword" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>I want to join as:</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="role" value="volunteer" checked> Volunteer
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="role" value="eo"> Event Organizer
                        </label>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="agreement" required>
                    <label for="agreement">I agree with the terms and conditions</label>
                </div>

                <button type="submit" class="btn-auth">Sign Up Now</button>
            </form>
        </section>
    </div>

    <script src="script_register.js"></script>
</body>
</html>
