<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B' Helpful - Log In</title>
    <link rel="stylesheet" href="style_register.css"> <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="register-body">
    <nav class="auth-navbar">
        <img src="assets/b-helpful logo.jpeg" alt="B-Helpful Logo" class="logo">
        <a href="registerpage.html" class="nav-link-auth">Sign up &rarr;</a>
    </nav>

    <div class="auth-container">
        <section class="auth-form-section">
            <form id="loginForm" class="auth-form">
                <h2 class="form-title">Log In Account</h2>
                
                <div class="input-group">
                    <label for="email">Email or Username</label>
                    <input type="text" id="login_id" name="login_id" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn-auth">Log In</button>
                <p class="forgot-pass">Forgot password? <a href="#">Click here</a></p>
            </form>
        </section>

        <section class="auth-desc">
            <h1>Selamat Datang Kembali!</h1>
            <p>Lanjutkan kontribusi sosialmu dan kumpulkan jam Comserv dengan mudah.</p>
            <img src="assets/logobinus.png" alt="Binus Logo" class="binus-logo-auth">
        </section>
    </div>

    <script src="script_login.js"></script>
</body>
</html>
