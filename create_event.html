<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B' Helpful - Create Event</title>
    <link rel="stylesheet" href="style_dashboard.css"> <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 0 auto;
        }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        .form-group label { font-weight: bold; margin-bottom: 8px; }
        .form-group input, .form-group textarea {
            padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <img src="assets/b-helpful logo.jpeg" alt="B-Helpful Logo" class="logo">
        <ul class="navlink">
            <li class="unpaged"><a href="dashboard.html">&larr; Back to Dashboard</a></li>
        </ul>
    </nav>

    <main class="dashboard-container">
        <div class="form-container">
            <h2 style="color: #17a948; text-align: center; margin-bottom: 20px;">Create New Volunteering Event</h2>
            <form id="createEventForm">
                <div class="form-group">
                    <label for="title">Event Title</label>
                    <input type="text" id="title" required placeholder="e.g., Beach Cleanup 2026">
                </div>

                <div class="form-group">
                    <label for="event_image">Event Banner / Logo</label>
                    <input type="file" id="event_image" accept="image/*" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="4" required placeholder="Jelaskan detail kegiatan..."></textarea>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" required placeholder="e.g., Pantai Ancol, Jakarta">
                </div>

                <div class="form-group">
                    <label for="event_date">Date & Time</label>
                    <input type="datetime-local" id="event_date" required>
                </div>

                <div style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="max_quota">Max Volunteer Quota</label>
                        <input type="number" id="max_quota" min="1" required placeholder="e.g., 20">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="hours_reward">Comserv Hours Reward</label>
                        <input type="number" id="hours_reward" min="1" required placeholder="e.g., 5">
                    </div>
                </div>

                <button type="submit" class="btn-approve" style="width: 100%; padding: 15px; font-size: 16px;">Publish Event</button>
            </form>
        </div>
    </main>

    <script src="script_create_event.js"></script>
</body>
</html>
